version: '3.8'

services:
  # Database service
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rfp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend application service
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/rfp_db?schema=public"
      GEMINI_API_KEY: "your_actual_api_key_here"
      GEMINI_MODEL: "gemini-pro"
      CONTEXT_TIMER_MINUTES: 15
    depends_on:
      - db

volumes:
  postgres_data:
